# Coturn TURN Server Configuration
# Required for participants behind strict NATs/firewalls

listening-port=3478
tls-listening-port=5349

# Replace with your VPS public IP
external-ip=YOUR_VPS_PUBLIC_IP

# Replace with your domain
realm=turn.meet.learnova.com

# TURN relay port range
min-port=49152
max-port=49200

# Authentication
lt-cred-mech
# Replace with a secure username:password
user=learnova:CHANGE_THIS_PASSWORD

# Logging
verbose
fingerprint

# Performance
total-quota=100
stale-nonce=600

# No CLI
no-cli
